<style>
  /* ── Image Gallery Section ── */
  .wp-gallery-container {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    justify-content: center;
    padding: 60px 20px;
    max-width: 1200px;
    margin: 0 auto;
    box-sizing: border-box;
  }

  /* Initial hidden state for image scroll animation */
  .scroll-trigger-img {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    width: 100%;
    max-width: 500px;
    height: auto;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  }

  /* Triggered visible state for images */
  .scroll-trigger-img.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Countdown Timers ── */
  .csa-countdown-section{
    max-width:1200px;
    margin:40px auto;
    padding:0 20px;
    box-sizing: border-box;
  }

  .csa-countdown-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
  }

  .csa-countdown-card{
    background:#8B1A1A;
    color:#fff;
    padding:30px 20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.12);
  }

  .csa-countdown-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:15px;
    text-transform:uppercase;
    letter-spacing:1px;
    font-family: Arial, Helvetica, sans-serif;
  }

  .csa-countdown-timer{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
  }

  .csa-time-box{
    min-width:65px;
  }

  .csa-time-value{
    display:block;
    font-size:32px;
    font-weight:700;
    line-height:1;
    font-family: Arial, 'Poppins', sans-serif;
  }

  .csa-time-label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    opacity:.8;
    margin-top:5px;
    font-family: Arial, Helvetica, sans-serif;
  }

  /* ── Stats Strip Section ── */
  .csa-stats-strip {
    width: 100%;
    background: #8B1A1A;
    padding: 0;
    margin: 40px 0 0 0;
  }
  .csa-stats-strip-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    align-items: stretch;
  }
  .csa-stats-item {
    flex: 1 1 25%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px 10px;
    border-right: 1px solid rgba(255,255,255,0.15);
    text-align: left;
    box-sizing: border-box;
    transition: background 0.3s ease;
  }
  .csa-stats-item:last-child { border-right: none; }
  .csa-stats-item:hover { background: rgba(255,255,255,0.08); }
  .csa-stats-icon { font-size: 32px; line-height: 1; flex-shrink: 0; }
  .csa-stats-text { display: flex; flex-direction: column; }

  /* Slot machine container */
  .csa-stats-number {
    font-family: Arial, 'Poppins', sans-serif;
    font-size: clamp(48px, 3.5vw, 42px);
    font-weight: 700;
    color: #ffffff;
    line-height: 1;
    margin-bottom: 4px;
    display: flex;
    align-items: baseline;
    gap: 1px;
    overflow: hidden;
  }

  /* Each digit slot */
  .csa-digit-slot {
    display: inline-flex;
    flex-direction: column;
    overflow: hidden;
    height: 1em;
    position: relative;
  }
  .csa-digit-reel {
    display: flex;
    flex-direction: column;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    will-change: transform;
  }
  .csa-digit-reel span {
    height: 1em;
    line-height: 1em;
    display: block;
    text-align: center;
  }

  /* Non-digit characters (like + , .) */
  .csa-static-char {
    display: inline-block;
  }

  .csa-stats-label {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    white-space: nowrap;
  }

  /* ── Lightbox Overlay ── */
  .custom-lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .custom-lightbox.active {
    opacity: 1;
    pointer-events: auto;
  }

  .custom-lightbox img {
    max-width: 90%;
    max-height: 85%;
    border-radius: 4px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
    transform: scale(0.95);
    transition: transform 0.3s ease;
  }

  .custom-lightbox.active img {
    transform: scale(1);
  }

  .lightbox-close {
    position: absolute;
    top: 20px;
    right: 25px;
    color: #ffffff;
    font-size: 45px;
    font-weight: 300;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s ease;
    user-select: none;
  }

  .lightbox-close:hover {
    color: #ff5c5c;
  }

  /* Responsive breakpoints */
  @media (max-width: 768px) {
    .csa-countdown-grid{
      grid-template-columns:1fr;
    }
    .csa-stats-item {
      flex: 1 1 50%;
      border-right: none;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding: 24px 20px;
    }
    .csa-stats-item:nth-child(odd) { border-right: 1px solid rgba(255,255,255,0.15); }
    .csa-stats-item:nth-last-child(-n+2) { border-bottom: none; }
    .wp-gallery-container { padding: 40px 15px; gap: 20px; }
  }
  @media (max-width: 420px) {
    .csa-stats-item { flex: 1 1 100%; border-right: none !important; }
    .csa-stats-item:last-child { border-bottom: none; }
  }
</style>

<script>
(function () {
  // ─── PART 1: Slot Machine Execution ───
  function buildSlotMachine(el) {
    const raw = el.getAttribute('data-value') || el.textContent.trim();
    el.textContent = '';

    for (let i = 0; i < raw.length; i++) {
      const ch = raw[i];

      if (/[0-9]/.test(ch)) {
        const slot = document.createElement('span');
        slot.className = 'csa-digit-slot';

        const reel = document.createElement('span');
        reel.className = 'csa-digit-reel';

        const digits = [];
        for (let d = 0; d <= 9; d++) digits.push(d);
        digits.push(parseInt(ch));

        digits.forEach(d => {
          const s = document.createElement('span');
          s.textContent = d;
          reel.appendChild(s);
        });

        reel.style.transform = 'translateY(0)';
        slot.appendChild(reel);
        el.appendChild(slot);

        slot._reel = reel;
        slot._targetIndex = 10;
      } else {
        const s = document.createElement('span');
        s.className = 'csa-static-char';
        s.textContent = ch;
        el.appendChild(s);
      }
    }
  }

  function animateSlots(el, delayBase) {
    const slots = el.querySelectorAll('.csa-digit-slot');
    slots.forEach((slot, i) => {
      const reel = slot._reel;
      const targetIndex = slot._targetIndex;
      const delay = delayBase + i * 80;

      setTimeout(() => {
        reel.style.transition = 'none';
        reel.style.transform = 'translateY(0)';
        reel.offsetHeight; // force layout reflow
        reel.style.transition = `transform ${0.55 + i * 0.04}s cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
        reel.style.transform = `translateY(-${targetIndex}em)`;
      }, delay);
    });
  }

  // ─── PART 2: Countdown Timers Engine ───
  function startCountdown(id, targetDate) {
    const el = document.getElementById(id);
    if (!el) return;

    function update() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        el.innerHTML = '<div class="csa-time-value">ENDED</div>';
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      el.innerHTML = `
        <div class="csa-time-box">
          <span class="csa-time-value">${days}</span>
          <span class="csa-time-label">Days</span>
        </div>
        <div class="csa-time-box">
          <span class="csa-time-value">${hours}</span>
          <span class="csa-time-label">Hours</span>
        </div>
        <div class="csa-time-box">
          <span class="csa-time-value">${minutes}</span>
          <span class="csa-time-label">Minutes</span>
        </div>
        <div class="csa-time-box">
          <span class="csa-time-value">${seconds}</span>
          <span class="csa-time-label">Seconds</span>
        </div>
      `;
    }

    update();
    setInterval(update, 1000);
  }

  // ─── PART 3: Initialization, Scroll Tracking, & Lightbox ───
  function initAll() {
    // Fire Countdowns
    startCountdown("countdown1", new Date("June 15, 2026 23:59:59").getTime());
    startCountdown("countdown2", new Date("June 17, 2026 23:59:59").getTime());
    startCountdown("countdown3", new Date("June 18, 2026 23:59:59").getTime());

    // Setup counter slot machines
    const numbers = document.querySelectorAll('.csa-stats-number[data-value]');
    numbers.forEach(el => buildSlotMachine(el));

    // Observer for Stats Strip
    const statsObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const targetNumbers = entry.target.querySelectorAll('.csa-stats-number');
          targetNumbers.forEach((el, idx) => {
            animateSlots(el, idx * 150);
          });
        } else {
          const reels = entry.target.querySelectorAll('.csa-digit-reel');
          reels.forEach(reel => {
            reel.style.transition = 'none';
            reel.style.transform = 'translateY(0)';
          });
        }
      });
    }, { threshold: 0.3 });

    const strip = document.getElementById('csaStatsStrip');
    if (strip) statsObserver.observe(strip);

    // Observer for Image Scroll Entrance Animations
    const scrollImages = document.querySelectorAll('.scroll-trigger-img');
    const imageObserver = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target); // Animates once
        }
      });
    }, { threshold: 0.15 });

    scrollImages.forEach(img => imageObserver.observe(img));

    // Lightbox Mechanics
    const lightbox = document.getElementById('customLightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    scrollImages.forEach(img => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden'; 
      });
    });

    const closeBox = () => {
      lightbox.classList.remove('active');
      document.body.style.overflow = ''; 
      setTimeout(() => { lightboxImg.src = ''; }, 300);
    };

    if (lightboxClose) lightboxClose.addEventListener('click', closeBox);
    if (lightbox) {
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeBox();
      });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initAll);
  } else {
    initAll();
  }
})();
</script>
