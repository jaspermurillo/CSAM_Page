<!-- Carousel Styles -->
<style>
  .carousel-container {
    position: relative;
    width: 100%;
    max-width: 1920px;
    margin: auto;
    overflow: hidden;
  }

  .carousel-track {
    display: flex;
    transition: transform 0.5s ease;
  }

  .slide {
    flex-shrink: 0;
    width: 100%;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .slide img {
    width: 100%;
    height: auto;
    max-width: 100%;
    display: block;
    object-fit: contain;
  }

  /* Rounded Buttons Group for First Slide */
  .slide-btn-group {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .slide-btn {
    background-color: #F28705;
    color: white;
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 16px;
    transition: background-color 0.3s ease;
  }

  .slide-btn:hover {
    background-color: #333;
  }

  .slide-btn.secondary {
    background-color: #F28705;
  }

  .slide-btn.secondary:hover {
    background-color: #333;
  }

  /* CTA on Slide 3 */
  .has-button .cta-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #ffffff ;
    color: #333;
    border: none;
    padding: 12px 24px;
    font-size: 18px;
    border-radius: 999px;
    text-decoration: none;
  }
/* Positioning the button on Slide 4 at the lower right */
.slide-4 .bottom-right {
  position: absolute;
  bottom: 30px;  /* Adjust this value as needed */
  right: 30px;   /* Adjust this value as needed */
  background-color: #F28705;
  color: white;
  text-decoration: none;
  padding: 12px 24px;
  border-radius: 999px;
  font-size: 16px;
  transition: background-color 0.3s ease;
}

.slide-4 .bottom-right:hover {
  background-color: #333;
}

  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    color: white;
    border: none;
    font-size: 32px;
    cursor: pointer;
    z-index: 1;
  }

  .nav-btn.left { left: 10px; }
  .nav-btn.right { right: 10px; }

  .indicators {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
  }

  .indicator {
    width: 15px;
    height: 15px;
    background: #a1a1a1;
    border-radius: 50%;
    cursor: pointer;
  }

  @media (max-width: 768px) {
    .slide img { height: auto; }
    .slide-btn-group {
      flex-direction: column;
      gap: 8px;
    }
    .slide-btn {
      padding: 10px 20px;
      font-size: 14px;
    }
  }

  @media (max-width: 480px) {
    .slide img { height: auto; }
    .indicator {
      width: 10px;
      height: 10px;
    }
    .cta-btn {
      font-size: 14px;
      padding: 10px 20px;
    }
  }
</style>

<!-- Carousel Script -->
<script>
  let currentIndex = 0;
  const interval = 6000;
  let autoPlayInterval;
  const carousel = document.getElementById('carousel');
  const indicators = document.querySelectorAll('.indicator');

  function moveSlide(dir) {
    const slides = document.querySelectorAll('#carousel > .slide');
    currentIndex = (currentIndex + dir + slides.length) % slides.length;
    carousel.style.transform = `translateX(-${currentIndex * 100}%)`;
    updateIndicators();
  }

  function goToSlide(index) {
    currentIndex = index;
    carousel.style.transform = `translateX(-${index * 100}%)`;
    updateIndicators();
  }

  function updateIndicators() {
    indicators.forEach((el, i) => {
      el.style.backgroundColor = i === currentIndex ? '#d4af37' : '#fff';
    });
  }

  function observeCarousel() {
    const observer = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) startAutoPlay();
      else stopAutoPlay();
    }, { threshold: 0.5 });
    observer.observe(document.querySelector('.carousel-container'));
  }

  function startAutoPlay() {
    if (!autoPlayInterval) {
      autoPlayInterval = setInterval(() => moveSlide(1), interval);
    }
  }

  function stopAutoPlay() {
    clearInterval(autoPlayInterval);
    autoPlayInterval = null;
  }

  // Swipe Support
  let startX = 0;
  carousel.addEventListener('touchstart', e => startX = e.touches[0].clientX);
  carousel.addEventListener('touchend', e => {
    const endX = e.changedTouches[0].clientX;
    if (startX - endX > 50) moveSlide(1);
    else if (endX - startX > 50) moveSlide(-1);
  });

  window.onload = () => {
    updateIndicators();
    observeCarousel();
  };
</script>
